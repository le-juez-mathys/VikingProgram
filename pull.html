<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage — Saga du Viking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0d10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Viking">
<link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>

<div id="nav-container"></div>

<div class="wrap">
  <div id="minibar-container"></div>

  <div class="section" style="border-top:1px solid var(--iron); padding-top:34px;">
    <div class="section-head">
      <div class="rune-mark">Quête · Force</div>
      <h2>Tirage — Dos, Biceps</h2>
      <p class="lede">Choisis la variante du jour, renseigne le poids et les répétitions de chaque exercice, coche ce que tu as accompli, puis grave la quête.</p>
    </div>

    <div class="bodymap-wrap" id="bodymap" style="max-width:320px; margin:0 auto 20px;"></div>

    <div class="variant-tabs">
      <button class="variant-tab active" id="tab-pull" onclick="switchVariant('pull')">Tirage I</button>
      <button class="variant-tab" id="tab-pull2" onclick="switchVariant('pull2')">Tirage II</button>
    </div>

    <div id="exo-container"></div>

    <div class="altar" style="margin-top:6px;">
      <div class="form-row">
        <label for="effort">Intensité ressentie</label>
        <div class="range-row">
          <input type="range" id="effort" min="1" max="3" value="2" step="1">
          <span class="range-val" id="effort-label">Modérée</span>
        </div>
      </div>
      <button class="btn" onclick="validateQuest()">Graver cette quête ⚔</button>
    </div>
  </div>
</div>

<footer>Saga du Viking · tes données restent stockées sur cet appareil (stockage persistant du navigateur)</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/app.js"></script>
<script>
  let currentVariant = "pull";

  function switchVariant(v){
    currentVariant = v;
    document.getElementById("tab-pull").classList.toggle("active", v === "pull");
    document.getElementById("tab-pull2").classList.toggle("active", v === "pull2");
    buildExerciseInputs("exo-container", currentVariant);
    renderCategoryBodyMap("bodymap", currentVariant);
  }

  const EFFORT_LABELS = {1:"Légère", 2:"Modérée", 3:"Intense"};
  document.getElementById("effort").addEventListener("input", e => {
    document.getElementById("effort-label").textContent = EFFORT_LABELS[e.target.value];
  });

  function validateQuest(){
    const entries = collectExerciseEntries("exo-container", currentVariant);
    const effort = parseInt(document.getElementById("effort").value, 10);
    const result = logCategorySession(currentVariant, entries, effort);
    buildExerciseInputs("exo-container", currentVariant);
    document.getElementById("minibar-container").innerHTML = renderMiniBar();
    const kcalNote = result.burnedKcal > 0 ? ` · ~${result.burnedKcal} kcal brûlées` : "";
    if(result.leveledUp){
      showLevelUpToast();
    } else {
      showSimpleToast(`+${result.xpGain} XP · ${result.doneCount}/${result.total} exercices${result.prCount ? " · "+result.prCount+" record(s) !" : ""}${kcalNote}`);
    }
  }

  (async () => {
    await initPage("pull");
    switchVariant("pull");
  })();
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(err => console.warn("Service worker non enregistré :", err));
    });
  }
</script>
</body>
</html>
