<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte du corps — Saga du Viking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="nav-container"></div>

<div class="wrap">
  <div id="minibar-container"></div>

  <div class="section" style="border-top:1px solid var(--iron); padding-top:34px;">
    <div class="section-head">
      <div class="rune-mark">Anatomie du guerrier</div>
      <h2>La carte du corps</h2>
      <p class="lede">Survole ou clique une zone pour la voir s'illuminer sur le corps, et découvre les exercices qui la travaillent.</p>
    </div>

    <div class="bodymap-wrap" id="bodymap"></div>

    <div class="zone-grid" id="zone-grid"></div>
  </div>
</div>

<footer>Saga du Viking · tes données restent stockées sur cet appareil (stockage persistant du navigateur)</footer>

<script src="assets/app.js"></script>
<script>
  (async () => {
    await initPage("corps");
    document.getElementById("bodymap").innerHTML = bodyMapSVG();
    highlightBodyZones("bodymap", []);

    const grid = document.getElementById("zone-grid");
    grid.innerHTML = Object.entries(ZONE_EXERCISES).map(([key, zone]) => `
      <div class="zone-card" onmouseenter="highlightBodyZones('bodymap', ['${key}'])" onmouseleave="highlightBodyZones('bodymap', [])" onclick="highlightBodyZones('bodymap', ['${key}'])">
        <div class="zc-label">${zone.label} <span style="font-family:var(--font-mono); font-size:10px; color:var(--parchment-dim);">(${zone.view === 'front' ? 'face' : 'dos'})</span></div>
        <ul>${zone.exos.map(e => `<li>${e}</li>`).join("")}</ul>
      </div>
    `).join("");
  })();
</script>
</body>
</html>
