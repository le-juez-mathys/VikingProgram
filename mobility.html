<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobilité — Saga du Viking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="nav-container"></div>

<div class="wrap">
  <div id="minibar-container"></div>

  <div class="section" style="border-top:1px solid var(--iron); padding-top:34px;">
    <div class="section-head">
      <div class="rune-mark">Quête · Récupération</div>
      <h2>Repos actif / Mobilité</h2>
      <p class="lede">Un viking sait aussi se régénérer. Coche ce que tu as fait — pas besoin de poids ici.</p>
    </div>

    <div id="exo-container"></div>

    <div class="altar" style="margin-top:6px;">
      <div class="form-row">
        <label for="effort">Intensité ressentie</label>
        <div class="range-row">
          <input type="range" id="effort" min="1" max="3" value="1" step="1">
          <span class="range-val" id="effort-label">Légère</span>
        </div>
      </div>
      <button class="btn" onclick="validateQuest()">Graver cette quête ⚔</button>
    </div>
  </div>
</div>

<footer>Saga du Viking · tes données restent dans ce navigateur (localStorage)</footer>

<script src="assets/app.js"></script>
<script>
  initPage("mobility");
  buildExerciseInputs("exo-container", "mobility");

  const EFFORT_LABELS = {1:"Légère", 2:"Modérée", 3:"Intense"};
  document.getElementById("effort").addEventListener("input", e => {
    document.getElementById("effort-label").textContent = EFFORT_LABELS[e.target.value];
  });

  function validateQuest(){
    const entries = collectExerciseEntries("exo-container", "mobility");
    const effort = parseInt(document.getElementById("effort").value, 10);
    const result = logCategorySession("mobility", entries, effort);
    buildExerciseInputs("exo-container", "mobility");
    document.getElementById("minibar-container").innerHTML = renderMiniBar();
    if(result.leveledUp){
      showLevelUpToast();
    } else {
      showSimpleToast(`+${result.xpGain} XP · ${result.doneCount}/${result.total} accomplies`);
    }
  }
</script>
</body>
</html>
